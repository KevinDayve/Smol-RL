# configs/dapo_qwen3.yaml

model:
  name: Qwen/Qwen3-1.7B
  trust_remote_code: true
  bf16: true

dataset:
  name: qwedsacf/competition_math
  max_rows: null

training:
  seed: 42
  device_index: 0
  lr: 1e-5
  train_batch_size: 4
  grad_acc_steps: 4
  epochs_per_step: 1
  max_norm: 1.0
  checkpoint_path: ./output
  checkpoint_interval: 20

loss:
  name: dapo
  eps_low: 0.2
  eps_high: 0.28
  entropy_coef: 0.001

rollout:
  group_size: 12
  rollouts_per_step: 32
  max_length: 2048
  top_p: 1.0
  temperature: 1.0
  gpu_memory_utilization: 0.3
  sync_interval: 2

wandb:
  project: tinyrl
  run_name: dapo-qwen3
  enabled: true